name: Feature request
description: Suggest something Editor could do that it doesn't.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's painful or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Idea
      description: How might Editor solve this? Sketches, references, comparisons all welcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Workarounds you've tried, similar features in other tools, links.
